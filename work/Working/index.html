<p>Speeds are: </p>
<div id="speeds"></div>
<p id="YSpeed">Enter your speed</p>
<button id="SpeedButton" type="button">click to enter speed</button>
<script>
function DisSpeed() {
 const SpeedMPH = window.prompt("Enter your speed in MPH");
 const SpeedFPS = SpeedMPH * 1.46667;
 const SpeedKPH = SpeedMPH * 1.60934;
 document.getElementById("YSpeed").innerHTML = "MPH: " + SpeedMPH + ", FPS: " + SpeedFPS + ", KPH: " + SpeedKPH;
}
document.getElementById("SpeedButton").addEventListener("mousedown", DisSpeed);

</script>
